<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Maturity Ladder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(15, 23, 42, 0.95);
            border-radius: 16px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 { color: #e2e8f0; margin-bottom: 20px; }
        p { color: #cbd5e1; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #475569; background: #1e293b; color: #e2e8f0; }
        .list { max-height: 400px; overflow-y: auto; }
        button { width: 100%; padding: 10px; margin-bottom: 8px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #2563eb; }
        .hidden { display: none; }
        .progress { width: 100%; height: 6px; background: #334155; border-radius: 3px; margin: 20px 0; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 3px; }
        .question-group { background: rgba(51, 65, 85, 0.3); padding: 16px; border-radius: 8px; margin-bottom: 16px; }
        .question-text { color: #e2e8f0; font-weight: 500; margin-bottom: 12px; }
        .options { display: flex; gap: 8px; }
        .opt { flex: 1; padding: 8px; background: #1e293b; color: #cbd5e1; border: 1px solid #475569; border-radius: 4px; cursor: pointer; text-align: center; }
        .opt.selected { background: #3b82f6; color: white; border-color: #2563eb; }
        .badge { display: inline-block; background: #3b82f6; color: white; padding: 10px 20px; border-radius: 6px; margin-bottom: 20px; }
        .bar { width: 100%; height: 8px; background: #334155; border-radius: 4px; margin: 8px 0; }
        .bar-fill { height: 100%; background: #3b82f6; border-radius: 4px; }
        .result-item { margin-bottom: 20px; color: #cbd5e1; }
        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        .button-group button { flex: 1; padding: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- SCREEN 1: SELECT NAME -->
        <div id="screen1">
            <h1>Data Maturity Ladder</h1>
            <p>Labour Inspection Digital Transformation Assessment</p>
            <input id="search" type="text" placeholder="Search for your name..." onkeyup="filterList()">
            <div class="list" id="list"></div>
        </div>

        <!-- SCREEN 2: QUESTIONS -->
        <div id="screen2" class="hidden">
            <h1>Assessment</h1>
            <p id="name2"></p>
            <div class="progress"><div class="progress-bar" id="prog" style="width:0%"></div></div>
            <div id="prog-text" style="color:#cbd5e1; text-align:center; margin-bottom:20px; font-size:14px;">0 of 6 answered</div>
            <div id="questions"></div>
            <div class="button-group">
                <button onclick="goBack()">Back</button>
                <button id="submit-btn" onclick="showResults()" disabled>See Results</button>
            </div>
        </div>

        <!-- SCREEN 3: RESULTS -->
        <div id="screen3" class="hidden">
            <h1>Results</h1>
            <p id="name3"></p>
            <div id="results"></div>
            <button onclick="startOver()" style="width:100%; padding:12px; background:#8b5cf6; color:white; border:none; border-radius:6px; cursor:pointer; margin-top:20px;">Start Over</button>
        </div>
    </div>

    <script>
        const data = {
            names: ["Matheus Alves Klein Viana (Brazil)", "Mlungski Mdumseni Mabuza (Eswatini)", "Sinya Godwell Mtawali (Malawi)", "Nonyelum Calista Anayo-Uzochukwu (Nigeria)", "Yusuf Halilu (Nigeria)", "Muhammad Duri Haruna (Nigeria)", "Nkiru Theresa Nwana (Nigeria)", "Christopher Dio Okpanachi (Nigeria)", "Linda Ogadinma Okpara (Nigeria)", "Margaret Israel Udoh (Nigeria)", "Hamida Ali (Tunisia)", "Mert Eksi (Türkiye)", "Vedat Üçtas (Türkiye)", "Vadym Bondar (Ukraine)", "Ihor Dehnera (Ukraine)", "Oleh Honchar (Ukraine)", "Oleksandr Ihnatov (Ukraine)", "Olena Konovalova (Ukraine)", "Svitlana Nichyk (Ukraine)", "Ruslan Pavlovskyi (Ukraine)", "Oleksandr Rozumnyi (Ukraine)", "Roman Semchuk (Ukraine)", "Sergii Baidiuk (Ukraine)", "Andrii Tymenko (Ukraine)", "Ada (ILO)", "Rumsha (ILO)", "Tetyana (ILO)", "ITCILO (Testing)", "Guest"],
            questions: [
                { id: 'storage', label: 'Data Storage', q: 'How are your core labour inspection records stored?' },
                { id: 'integration', label: 'Data Integration', q: 'How connected are your data systems?' },
                { id: 'targeting', label: 'Targeting & Risk', q: 'How do you identify which workplaces to inspect?' },
                { id: 'quality', label: 'Data Quality', q: 'How is data quality managed?' },
                { id: 'analytics', label: 'Analytics & Reporting', q: 'How do you analyze and report inspection data?' },
                { id: 'technology', label: 'Technology & Capacity', q: 'What technology and training are available?' }
            ],
            levels: [
                { lvl: 1, name: 'Analog', color: '#ef4444', char: 'Paper-based records; limited digital documentation', next: 'Digitize core datasets' },
                { lvl: 2, name: 'Digitized', color: '#f97316', char: 'Digital systems in silos', next: 'Link to external registers' },
                { lvl: 3, name: 'Integrated', color: '#eab308', char: 'Systems linked to external registers', next: 'Implement data quality checks' },
                { lvl: 4, name: 'Analytical', color: '#22c55e', char: 'Routine trend analysis & manual scoring', next: 'Pilot ML models' },
                { lvl: 5, name: 'Predictive/AI', color: '#06b6d4', char: 'ML-powered predictions with explainable outputs', next: 'Expand to multi-risk models' }
            ]
        };

        let state = { name: '', answers: {} };

        function init() {
            renderList();
        }

        function renderList() {
            let html = '';
            data.names.forEach(n => {
                html += `<button onclick="selectName('${n}')">${n}</button>`;
            });
            document.getElementById('list').innerHTML = html;
        }

        function filterList() {
            const search = document.getElementById('search').value.toLowerCase();
            const filtered = data.names.filter(n => n.toLowerCase().includes(search));
            let html = '';
            filtered.forEach(n => {
                html += `<button onclick="selectName('${n}')">${n}</button>`;
            });
            document.getElementById('list').innerHTML = html;
        }

        function selectName(name) {
            state.name = name;
            state.answers = {};
            document.getElementById('screen1').classList.add('hidden');
            document.getElementById('screen2').classList.remove('hidden');
            document.getElementById('name2').textContent = name;
            renderQuestions();
        }

        function renderQuestions() {
            let html = '';
            data.questions.forEach(q => {
                html += `
                    <div class="question-group">
                        <div style="color:#999; font-size:12px; margin-bottom:8px;">${q.label}</div>
                        <div class="question-text">${q.q}</div>
                        <div class="options">
                            ${[1,2,3,4,5].map(i => `<button class="opt" onclick="answer('${q.id}', ${i})" data-q="${q.id}" data-v="${i}"> ${i} </button>`).join('')}
                        </div>
                    </div>
                `;
            });
            document.getElementById('questions').innerHTML = html;
        }

        function answer(qid, val) {
            state.answers[qid] = val;
            document.querySelectorAll(`[data-q="${qid}"]`).forEach(b => b.classList.remove('selected'));
            document.querySelector(`[data-q="${qid}"][data-v="${val}"]`).classList.add('selected');
            updateProgress();
        }

        function updateProgress() {
            const count = Object.keys(state.answers).length;
            const pct = (count / 6) * 100;
            document.getElementById('prog').style.width = pct + '%';
            document.getElementById('prog-text').textContent = `${count} of 6 answered`;
            document.getElementById('submit-btn').disabled = count < 6;
        }

        function showResults() {
            const vals = Object.values(state.answers);
            const avg = Math.round(vals.reduce((a,b)=>a+b,0) / vals.length);
            const lvl = Math.max(1, Math.min(5, avg));
            const level = data.levels[lvl - 1];

            let html = `
                <div class="badge" style="background:${level.color}">Level ${lvl}: ${level.name}</div>
            `;

            data.questions.forEach(q => {
                const score = state.answers[q.id] || 0;
                html += `
                    <div class="result-item">
                        <div style="font-size:13px; margin-bottom:6px;">${q.label}</div>
                        <div class="bar"><div class="bar-fill" style="width:${(score/5)*100}%;"></div></div>
                    </div>
                `;
            });

            html += `
                <div style="background:rgba(51,65,85,0.3); padding:16px; border-radius:8px; margin-top:20px;">
                    <div style="color:#e2e8f0; font-weight:600; margin-bottom:8px;">Level ${lvl} Characteristics:</div>
                    <div style="color:#cbd5e1; font-size:13px;">${level.char}</div>
                </div>
                <div style="background:rgba(59,130,246,0.1); padding:16px; border-radius:8px; margin-top:20px; border-left:4px solid #3b82f6;">
                    <div style="color:#e2e8f0; font-weight:600; margin-bottom:8px;">Next Steps:</div>
                    <div style="color:#cbd5e1; font-size:13px;">${level.next}</div>
                </div>
            `;

            document.getElementById('name3').textContent = state.name;
            document.getElementById('results').innerHTML = html;
            document.getElementById('screen2').classList.add('hidden');
            document.getElementById('screen3').classList.remove('hidden');
        }

        function goBack() {
            document.getElementById('screen2').classList.add('hidden');
            document.getElementById('screen1').classList.remove('hidden');
        }

        function startOver() {
            state = { name: '', answers: {} };
            document.getElementById('search').value = '';
            document.getElementById('screen3').classList.add('hidden');
            document.getElementById('screen1').classList.remove('hidden');
            renderList();
        }

        init();
    </script>
</body>
</html>
